services:
  - type: web
    name: bookmarket
    runtime: python
    region: frankfurt
    plan: free
    rootDir: bookmarket
    buildCommand: ./build.sh
    startCommand: gunicorn bookmarket.wsgi
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@bookmarket.tr
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "BookMarket2026!"
      - key: DATABASE_URL
        fromDatabase:
          name: bookmarket-db
          property: connectionString

databases:
  - name: bookmarket-db
    region: frankfurt
    plan: free
