{% extends 'base.html' %}

{% block title %}İlanı sil — {{ book.title }}{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-header">
        <div class="eyebrow" style="color: var(--danger);">Dikkat</div>
        <h1>İlanı silmek istediğine emin misin?</h1>
        <p><strong>{{ book.title }}</strong> kalıcı olarak silinecek.</p>
    </div>

    <div class="form-card">
        <form method="post" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            {% csrf_token %}
            <button type="submit" class="btn btn-accent" style="background:var(--danger); border-color:var(--danger);">Evet, sil</button>
            <a href="{% url 'book_detail' book.pk %}" class="btn">Vazgeç</a>
        </form>
    </div>
</div>
{% endblock %}
