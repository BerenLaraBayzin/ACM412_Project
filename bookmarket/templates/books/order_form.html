{% extends 'base.html' %}

{% block content %}
<h2>Satın al: {{ book.title }}</h2>
<p class="text-muted">{{ book.price }} TL — Satıcı: {{ book.seller.username }}</p>
<form method="post" class="mt-3" style="max-width: 520px;">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-success">Siparişi onayla</button>
    <a href="{% url 'book_detail' book.pk %}" class="btn btn-link">Vazgeç</a>
</form>
{% endblock %}
