{% extends 'base.html' %}

{% block content %}
<h2>Satıştaki Kitaplar</h2>
<div class="row">
    {% for book in books %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            {% if book.image %}
                <img src="{{ book.image.url }}" class="card-img-top" alt="{{ book.title }}" style="height: 200px; object-fit: cover;">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ book.title }}</h5>
                <p class="card-text text-muted">{{ book.author }}</p>
                <p class="card-text"><strong>{{ book.price }} TL</strong></p>
                <a href="{% url 'book_detail' book.pk %}" class="btn btn-primary">Detaylara Bak</a>
            </div>
        </div>
    </div>
    {% empty %}
        <p>Henüz kitap eklenmemiş. İlk kitabı sen ekle!</p>
    {% endfor %}
</div>
{% endblock %}
