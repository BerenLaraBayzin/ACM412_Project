{% extends 'base.html' %}

{% block content %}
<h2>Kayıt ol</h2>
<form method="post" class="mt-3" style="max-width: 480px;">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Hesap oluştur</button>
</form>
<p class="mt-2">Zaten hesabın var mı? <a href="{% url 'login' %}">Giriş yap</a></p>
{% endblock %}
