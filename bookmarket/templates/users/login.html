{% extends 'base.html' %}

{% block content %}
<h2>Giriş yap</h2>
<form method="post" class="mt-3" style="max-width: 400px;">
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
    {% endif %}
    <div class="mb-3">
        <label class="form-label" for="id_username">Kullanıcı adı</label>
        <input type="text" name="username" class="form-control" id="id_username" required autofocus>
    </div>
    <div class="mb-3">
        <label class="form-label" for="id_password">Şifre</label>
        <input type="password" name="password" class="form-control" id="id_password" required>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-primary">Giriş</button>
</form>
<p class="mt-2"><a href="{% url 'register' %}">Hesap oluştur</a></p>
{% endblock %}
