<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Pazarı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'book_list' %}">📚 İkinci El Kitap</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'book_list' %}">Anasayfa</a>
                {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'book_create' %}">Kitap Sat</a>
                    <a class="nav-link" href="{% url 'profile' %}">Profil ({{ user.username }})</a>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link">Çıkış</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Giriş Yap</a>
                    <a class="nav-link" href="{% url 'register' %}">Kayıt Ol</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
